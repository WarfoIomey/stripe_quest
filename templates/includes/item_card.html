<div class="col d-flex justify-content-center">
  <div class="card" style="width: 40rem;">
    <div class="card-body">
      <h5 class="card-title">{{ item.name }}</h5>
      <p class="card-text">{{ item.description }}</p>
      <p class="card-text">Цена: {{ item.price }} {{ item.currency }}</p>
      <button 
        class="btn btn-primary" 
        data-item-id="{{ item.id }}"
        onclick="handleBuyClick(this)"
      >
        Buy
      </button>
      <button onclick="window.location.href='/buy-intent/{{ item.id }}/'">
      Buy (Intent)
      </button>
    </div>
  </div>
</div>
<script src="https://js.stripe.com/v3/"></script>
<script>
  const stripe = Stripe('{{ stripe_public_key }}');
  async function handleBuyClick(button) {
    const itemId = button.dataset.itemId;
    button.disabled = true;
    button.textContent = 'Loading...';
    try {
        const response = await fetch(`/buy/${itemId}/`);
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.error || 'Failed to create checkout session');
        }
        if (!data.session_id) {
            throw new Error('No session ID returned');
        }
        const result = await stripe.redirectToCheckout({
            sessionId: data.session_id
        });
        if (result.error) {
            throw new Error(result.error.message);
        }
    } catch (error) {
        console.error(error);
        alert('Payment error: ' + error.message);
        button.disabled = false;
        button.textContent = 'Buy';
    }
  }
  function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');
          for (let i = 0; i < cookies.length; i++) {
              const cookie = cookies[i].trim();
              if (cookie.substring(0, name.length + 1) === (name + '=')) {
                  cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                  break;
              }
          }
      }
      return cookieValue;
  }
</script>
